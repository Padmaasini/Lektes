services:
  - type: web
    name: lektes-api
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: LK_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DATA_RETENTION_DAYS
        value: "30"
      - key: DATABASE_URL
        value: sqlite:///./lektes.db
      - key: DEBUG
        value: "False"
      - key: UPLOAD_DIR
        value: ./uploads
